<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赞助广告 - 即将开启</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: url('../../图片库/网站搭建图片/风景/ed9f8b3ce3c3b993d1634d437077733a.jpeg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 80px 60px;
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #000;
            font-size: 42px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .subtitle {
            color: rgba(0, 0, 0, 0.7);
            font-size: 18px;
            margin-bottom: 30px;
            letter-spacing: 3px;
        }

        .description {
            color: rgba(0, 0, 0, 0.9);
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
            padding: 0 20px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(0, 0, 0, 0.8);
            font-size: 14px;
        }

        .feature-dot {
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .back-btn {
            margin-top: 20px;
            padding: 15px 50px;
            background: transparent;
            color: #000;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .back-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            border-color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* 进度条 */
        .progress-container {
            margin: 30px 0;
            padding: 0 20px;
        }

        .progress-label {
            color: rgba(0, 0, 0, 0.8);
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 6px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 75%;
            background: linear-gradient(90deg, #2196F3 0%, #64B5F6 100%);
            border-radius: 3px;
            animation: progressShine 2s infinite;
        }

        @keyframes progressShine {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @media (max-width: 480px) {
            .container {
                padding: 50px 30px;
            }

            h1 {
                font-size: 32px;
            }

            .countdown-number {
                font-size: 28px;
            }

            .countdown-item {
                padding: 15px 20px;
                min-width: 70px;
            }

            .icon-wrapper {
                width: 100px;
                height: 100px;
            }

            .icon {
                font-size: 50px;
            }

            .features {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景粒子 -->
    <div class="particles" id="particles"></div>
    
    <!-- 光晕效果 -->
    <div class="glow"></div>

    <div class="container">
        <h1>即将开启</h1>
        <p class="subtitle">COMING SOON</p>
        
        <p class="description">
            我们正在精心筹备赞助广告位，未来将为您提供优质的展示平台。<br>
            敬请期待，精彩即将呈现！
        </p>

        <!-- 进度条 -->
        <div class="progress-container">
            <div class="progress-label">
                <span>筹备进度</span>
                <span>75%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-dot"></div>
                <span>精准投放</span>
            </div>
            <div class="feature">
                <div class="feature-dot"></div>
                <span>海量曝光</span>
            </div>
            <div class="feature">
                <div class="feature-dot"></div>
                <span>数据分析</span>
            </div>
        </div>

        <button class="back-btn" onclick="goBack()">返回上一页</button>
    </div>

    <script>
        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // 返回按钮功能
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '../动漫.html';
            }
        }
    </script>
</body>
</html>
