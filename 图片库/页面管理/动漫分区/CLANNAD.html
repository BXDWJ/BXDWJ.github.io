<!DOCTYPE html>
<html lang="zh-CN">
<head>

</head>
<body>
    <header class="site-header">
        <nav class="nav-bar">

    <section class="content-section" id="contentSection"></section>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <h2 class="modal-title">更多图片</h2>
      <div class="waterfall-gallery" id="waterfallGallery"></div>

  <div class="modal-overlay" id="imageModalOverlay">

      <div class="image-viewer" id="imageViewer"></div>

  </div>

  <script>
    // 导航链接配置 - 修改这里即可更改链接
    const navLinks = {
            home: '../动漫.html',
            sponsor: '../欢迎赞助/欢迎赞助/欢迎赞助.html',
            cooperation: '../欢迎合作/欢迎合作/欢迎合作.html',
            team: '../权威团队/权威团队/权威团队.html'
        };

    const pageData = {
      nav: [
        { text: '首页', href: navLinks.home },
        { text: '欢迎赞助', href: navLinks.sponsor },
        { text: '欢迎合作', href: navLinks.cooperation },
        { text: '权威团队', href: navLinks.team }
      ],
      title: 'CLANNAD',
      actions: ['编辑', '讨论', '上传视频'],
      subtitle: '京都动画制作的感人治愈系动画',
      expandText: '更多图片',
      expandLink: '#',
      images: [
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/157924cb8ddaab27faaf176229c75dba.jpeg', alt: 'CLANNAD图片1' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/272d60ed41d5afb5170646a9a7d1f058.jpeg', alt: 'CLANNAD图片2' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/2805c83f8d2fb777abcb5c481d7e9a11.jpeg', alt: 'CLANNAD图片3' }
      ],
      moreImages: [
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/351b89800d400ae1900e94569e96e663.png', alt: 'CLANNAD图片1', height: 'tall' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/3562157624461bf408d1e50dbf49b237.png', alt: 'CLANNAD图片2', height: 'short' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/51f0129abb928fcf744cb7d0386b3254.jpeg', alt: 'CLANNAD图片3', height: 'medium' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/6bf6b5e9953b2bbd67961be005d28d7f.png', alt: 'CLANNAD图片4', height: 'short' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/80f5af818da820042422c2b23b97aa8e.png', alt: 'CLANNAD图片5', height: 'tall' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/8da1f180bfb79fb608e01234704cfdea.jpeg', alt: 'CLANNAD图片6', height: 'medium' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/8f7a50cafc6b2921eda378d7d57da8e0.png', alt: 'CLANNAD图片7', height: 'tall' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/9aef03b1b08b4c88eef7d4b67f31ed2b.jpeg', alt: 'CLANNAD图片8', height: 'short' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/acf817cd2ce11a7ca9a19e07ddd1c0f0.png', alt: 'CLANNAD图片9', height: 'medium' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/c2a134f2ded8a2e176c2a206d62badff.jpeg', alt: 'CLANNAD图片10', height: 'short' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/d2ae81345675518297be12b5a0f19b9c.jpeg', alt: 'CLANNAD图片11', height: 'tall' },
        { src: '../../图片库/网站搭建图片/动漫/CLANNAD/f4f6a84da613583cbcd478b106b86046.png', alt: 'CLANNAD图片12', height: 'medium' }
      ],
      content: [
        {
          text: '《CLANNAD》是由京都动画制作的日本电视动画，改编自Key社的同名视觉小说游戏，于2007年至2008年播出两季。故事以主人公冈崎朋也为核心，讲述他在高中时期与各种人物相遇、成长，以及毕业后组建家庭、面对人生起伏的感人故事。作品以其深刻的情感描写和"家族"主题而闻名，被誉为"催泪神作"。'
        },
        {
          text: '冈崎朋也是光坂高中的一名问题学生，因家庭原因对生活失去热情，与父亲关系疏离。他在坡道上遇到了名叫古河渚的女孩，渚因身体原因休学一年后重返校园，性格内向但善良坚强。朋也帮助渚重建了戏剧部，两人逐渐相爱并最终结婚。渚的温柔和坚韧深深影响了朋也，让他重新找到了生活的意义。'
        },
        {
          text: '作品分为"学园篇"和"After Story"两部分。学园篇描绘了朋也与渚及朋友们的高中生活，包括藤林姐妹、坂上智代、一之濑琴美等角色的故事线。After Story则聚焦于朋也毕业后的生活，展现了他与渚组建家庭、面对丧妻之痛、与女儿冈崎汐相依为命的感人历程。这部分被认为是动画史上最催泪的篇章之一。'
        },
        {
          text: '古河渚是本作的女主角，性格温柔善良但有些天然呆，身体虚弱却从不轻言放弃。她最喜欢的食物是豆沙面包，梦想是重建戏剧部并站在舞台上表演。渚的坚强和对家人的爱贯穿全剧，她那句"无论何时，只要在一起"成为作品的核心主题。'
        },
        {
          text: '冈崎汐是朋也和渚的女儿，继承了母亲的温柔和父亲的倔强。在渚去世后，朋也一度无法面对女儿，将汐交给岳父母抚养。后来朋也终于醒悟，与汐重建了父女关系。汐那句"爸爸，不可以逃避哦"让无数观众泪流满面。'
        },
        {
          text: '《CLANNAD》的核心主题是"家族"——不仅仅是血缘关系，更是人与人之间相互扶持、共同成长的羁绊。作品通过朋也从叛逆少年到负责任的父亲的转变，展现了人生的成长与救赎。渚的父母古河秋生和古河早苗放弃了自己的梦想，全心全意照顾女儿，诠释了父母之爱的伟大。'
        },
        {
          text: '京都动画在制作上精益求精，细腻的人物表情、优美的背景作画、恰到好处的配乐，都为作品增色不少。特别是《团子大家族》这首插曲，以其温馨的旋律和象征意义，成为动画史上最具代表性的歌曲之一。《CLANNAD》作为Key社"催泪三部曲"之一，至今仍被众多观众视为人生必看的经典动画。'
        }
      ]
    };

    function renderNav(data) {
      const navList = document.getElementById('navList');
      navList.innerHTML = data.map(item => `
                <li class="nav-item">
                    <a href="${item.href}" class="nav-link">${item.text}</a>
                </li>
            `).join('');
    }

    function renderActions(data) {
      const actionList = document.getElementById('actionList');
      actionList.innerHTML = data.map(text => `
                <li><button class="action-btn" data-action="${text}">${text}</button></li>
            `).join('');

      document.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          handleAction(action);
        });
      });
    }

    function handleAction(action) {
      switch (action) {
        case '编辑':
          const editModal = createActionModal('编辑内容', `
                        <form id="editForm">
                            <div class="form-group">
                                <label>标题</label>
                                <input type="text" id="editTitle" value="${document.getElementById('articleTitle').textContent}" class="form-input">
                            </div>
                            <div class="form-group">
                                <label>副标题</label>
                                <input type="text" id="editSubtitle" value="${document.getElementById('subtitle').textContent}" class="form-input">
                            </div>
                            <div class="form-group">
                                <label>内容</label>
                                <textarea id="editContent" class="form-textarea" rows="10">${pageData.content.map(c => c.text).join('\n\n')}</textarea>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="form-cancel" id="editCancel">取消</button>
                                <button type="submit" class="form-submit">保存</button>
                            </div>
                        </form>
                    `);
          document.body.appendChild(editModal);
          document.getElementById('editForm').addEventListener('submit', (e) => {
            e.preventDefault();
            pageData.title = document.getElementById('editTitle').value;
            pageData.subtitle = document.getElementById('editSubtitle').value;
            const contentTexts = document.getElementById('editContent').value.split('\n\n').filter(text => text.trim() !== '');
            pageData.content = contentTexts.map(text => ({ text }));
            document.getElementById('articleTitle').textContent = pageData.title;
            document.getElementById('subtitle').textContent = pageData.subtitle;
            renderContent(pageData.content);

            // 显示成功提示
            const successMessage = document.createElement('div');
            successMessage.className = 'success-message';
            successMessage.textContent = '保存成功！';
            editModal.querySelector('.action-modal-content').appendChild(successMessage);

            setTimeout(() => {
              successMessage.remove();
              closeActionModal(editModal);
            }, 1000);
          });

          document.getElementById('editCancel').addEventListener('click', () => {
            closeActionModal(editModal);
          });

          openActionModal(editModal);
          break;
        case '讨论':
          const discussModal = createActionModal('讨论区', `
                        <div class="discuss-container">
                            <div class="discuss-form">
                                <textarea id="discussInput" class="form-textarea" placeholder="发表你的观点..." rows="3"></textarea>
                                <div class="form-actions">
                                    <button id="submitDiscuss" class="form-submit">发表评论</button>
                                </div>
                            </div>
                            <div class="discuss-list" id="discussList">
                                <div class="discuss-item">
                                    <div class="discuss-avatar">用户A</div>
                                    <div class="discuss-content">
                                        <div class="discuss-header">
                                            <div class="discuss-author">用户A</div>
                                            <div class="discuss-time">2024-01-15 10:30</div>
                                        </div>
                                        <div class="discuss-text">CLANNAD是我最喜欢的治愈系动画！</div>
                                        <div class="discuss-actions">
                                            <button class="discuss-reply-btn">回复</button>
                                            <button class="discuss-report-btn">举报</button>
                                            <button class="discuss-delete-btn">删除</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="discuss-item">
                                    <div class="discuss-avatar">用户B</div>
                                    <div class="discuss-content">
                                        <div class="discuss-header">
                                            <div class="discuss-author">用户B</div>
                                            <div class="discuss-time">2024-01-14 15:20</div>
                                        </div>
                                        <div class="discuss-text">看完CLANNAD哭了一整箱纸巾...</div>
                                        <div class="discuss-actions">
                                            <button class="discuss-reply-btn">回复</button>
                                            <button class="discuss-report-btn">举报</button>
                                            <button class="discuss-delete-btn">删除</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `);
          document.body.appendChild(discussModal);

          // 发表评论功能
          document.getElementById('submitDiscuss').addEventListener('click', () => {
            const text = document.getElementById('discussInput').value.trim();
            if (text) {
              const discussList = document.getElementById('discussList');
              const newItem = document.createElement('div');
              newItem.className = 'discuss-item';
              newItem.innerHTML = `
                                <div class="discuss-avatar">我</div>
                                <div class="discuss-content">
                                    <div class="discuss-header">
                                        <div class="discuss-author">我</div>
                                        <div class="discuss-time">${new Date().toLocaleString('zh-CN')}</div>
                                    </div>
                                    <div class="discuss-text">${text}</div>
                                    <div class="discuss-actions">
                                    <button class="discuss-reply-btn">回复</button>
                                    <button class="discuss-report-btn">举报</button>
                                    <button class="discuss-delete-btn">删除</button>
                                </div>
                                </div>
                            `;
              discussList.insertBefore(newItem, discussList.firstChild);
              document.getElementById('discussInput').value = '';
            }
          });

          // 使用事件委托处理讨论区按钮点击
          const discussList = document.getElementById('discussList');

          // 回复按钮点击事件
          discussList.addEventListener('click', function (e) {
            if (e.target.classList.contains('discuss-reply-btn')) {
              const discussItem = e.target.closest('.discuss-item');
              const author = discussItem.querySelector('.discuss-author').textContent;

              // 移除已有的回复框
              document.querySelectorAll('.reply-form').forEach(form => form.remove());

              // 创建回复框
              const replyForm = document.createElement('div');
              replyForm.className = 'reply-form';
              replyForm.innerHTML = `
                                <textarea class="form-textarea" placeholder="回复 ${author}..." rows="2"></textarea>
                                <div class="form-actions">
                                    <button class="form-cancel reply-cancel">取消</button>
                                    <button class="form-submit reply-submit">回复</button>
                                </div>
                            `;

              discussItem.querySelector('.discuss-actions').after(replyForm);

              // 绑定取消按钮
              replyForm.querySelector('.reply-cancel').addEventListener('click', () => {
                replyForm.remove();
              });

              // 绑定回复提交
              replyForm.querySelector('.reply-submit').addEventListener('click', () => {
                const replyText = replyForm.querySelector('textarea').value.trim();
                if (replyText) {
                  // 创建回复项
                  const replyItem = document.createElement('div');
                  replyItem.className = 'discuss-item reply-item';
                  replyItem.innerHTML = `
                                        <div class="discuss-avatar">我</div>
                                        <div class="discuss-content">
                                            <div class="discuss-header">
                                                <div class="discuss-author">我</div>
                                                <div class="discuss-time">${new Date().toLocaleString('zh-CN')}</div>
                                            </div>
                                            <div class="discuss-text">
                                                <span class="reply-to">@${author} </span>
                                                ${replyText}
                                            </div>
                                            <div class="discuss-actions">
                                                <button class="discuss-reply-btn">回复</button>
                                                <button class="discuss-report-btn">举报</button>
                                                <button class="discuss-delete-btn">删除</button>
                                            </div>
                                        </div>
                                    `;

                  discussItem.after(replyItem);
                  replyForm.remove();
                }
              });
            }

            // 举报按钮点击事件
            if (e.target.classList.contains('discuss-report-btn')) {
              const discussItem = e.target.closest('.discuss-item');
              const author = discussItem.querySelector('.discuss-author').textContent;

              // 自定义确认对话框
              const confirmModal = createActionModal('确认举报', `
                                <div class="confirm-dialog">
                                    <p>确定要举报 ${author} 的评论吗？</p>
                                    <div class="form-actions">
                                        <button class="form-cancel" id="confirmCancel">取消</button>
                                        <button class="form-submit" id="confirmReport">确认举报</button>
                                    </div>
                                </div>
                            `);
              document.body.appendChild(confirmModal);

              document.getElementById('confirmCancel').addEventListener('click', () => {
                closeActionModal(confirmModal);
              });

              document.getElementById('confirmReport').addEventListener('click', () => {
                closeActionModal(confirmModal);

                const reportModal = createActionModal('举报评论', `
                                    <div class="report-form">
                                        <p>请选择举报原因：</p>
                                        <div class="report-reasons">
                                            <label><input type="radio" name="reportReason" value="spam"> 垃圾信息</label>
                                            <label><input type="radio" name="reportReason" value="abuse"> 辱骂攻击</label>
                                            <label><input type="radio" name="reportReason" value="offensive"> 不良内容</label>
                                            <label><input type="radio" name="reportReason" value="other"> 其他原因</label>
                                        </div>
                                        <textarea class="form-textarea" placeholder="详细说明（选填）" rows="3"></textarea>
                                        <div class="form-actions">
                                            <button class="form-cancel" id="reportCancel">取消</button>
                                            <button class="form-submit" id="reportSubmit">提交举报</button>
                                        </div>
                                    </div>
                                `);
                document.body.appendChild(reportModal);

                document.getElementById('reportCancel').addEventListener('click', () => {
                  closeActionModal(reportModal);
                });

                document.getElementById('reportSubmit').addEventListener('click', () => {
                  showNotification('举报已提交，我们会尽快处理！', 'success');
                  closeActionModal(reportModal);
                });

                openActionModal(reportModal);
              });

              openActionModal(confirmModal);
            }

            // 删除按钮点击事件
            if (e.target.classList.contains('discuss-delete-btn')) {
              const discussItem = e.target.closest('.discuss-item');
              const author = discussItem.querySelector('.discuss-author').textContent;

              // 自定义确认对话框
              const confirmModal = createActionModal('确认删除', `
                                <div class="confirm-dialog">
                                    <p>确定要删除这条评论吗？</p>
                                    <div class="form-actions">
                                        <button class="form-cancel" id="confirmCancel">取消</button>
                                        <button class="form-submit" id="confirmDelete">删除</button>
                                    </div>
                                </div>
                            `);
              document.body.appendChild(confirmModal);

              document.getElementById('confirmCancel').addEventListener('click', () => {
                closeActionModal(confirmModal);
              });

              document.getElementById('confirmDelete').addEventListener('click', () => {
                discussItem.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                  discussItem.remove();
                }, 300);
                closeActionModal(confirmModal);
              });

              openActionModal(confirmModal);
            }
          });
          openActionModal(discussModal);
          break;
        case '上传视频':
          const videoModal = createActionModal('上传视频', `
                        <div class="video-upload-container">
                            <div class="upload-area" id="uploadArea">
                                <div class="upload-icon">📹</div>
                                <div class="upload-text">点击或拖拽视频文件到这里</div>
                                <div class="upload-hint">支持 MP4, WebM, AVI 格式</div>
                                <input type="file" id="videoInput" accept="video/*" style="display:none">
                            </div>
                            <div class="upload-progress" id="uploadProgress" style="display:none">
                                <div class="progress-bar-container">
                                    <div class="progress-bar" id="progressBar"></div>
                                </div>
                                <div class="progress-text" id="progressText">上传中... 0%</div>
                            </div>
                            <div class="uploaded-videos" id="uploadedVideos">
                                <div class="video-item">
                                    <div class="video-preview">▶</div>
                                    <div class="video-info">
                                        <div class="video-name">双子星公主预告片.mp4</div>
                                        <div class="video-size">15.2 MB</div>
                                    </div>
                                    <div class="video-actions">
                                        <button class="video-play-btn">播放</button>
                                        <button class="video-delete-btn">删除</button>
                                    </div>
                                </div>
                                <div class="video-item">
                                    <div class="video-preview">▶</div>
                                    <div class="video-info">
                                        <div class="video-name">精彩片段集锦.mp4</div>
                                        <div class="video-size">8.7 MB</div>
                                    </div>
                                    <div class="video-actions">
                                        <button class="video-play-btn">播放</button>
                                        <button class="video-delete-btn">删除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `);
          document.body.appendChild(videoModal);
          const uploadArea = document.getElementById('uploadArea');
          const videoInput = document.getElementById('videoInput');
          const uploadProgress = document.getElementById('uploadProgress');
          const progressBar = document.getElementById('progressBar');
          const progressText = document.getElementById('progressText');
          const uploadedVideos = document.getElementById('uploadedVideos');

          uploadArea.addEventListener('click', () => videoInput.click());
          uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
          });
          uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
          });
          uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('video/')) {
              uploadVideo(file);
            }
          });
          videoInput.addEventListener('change', () => {
            const file = videoInput.files[0];
            if (file) uploadVideo(file);
          });

          function uploadVideo(file) {
            // 显示上传进度
            uploadProgress.style.display = 'block';
            let progress = 0;
            const interval = setInterval(() => {
              progress += 5;
              if (progress > 100) {
                clearInterval(interval);
                uploadProgress.style.display = 'none';
                addVideoToList(file);
                return;
              }
              progressBar.style.width = `${progress}%`;
              progressText.textContent = `上传中... ${progress}%`;
            }, 200);
          }

          function addVideoToList(file) {
            const size = (file.size / 1024 / 1024).toFixed(1);
            const newItem = document.createElement('div');
            newItem.className = 'video-item';
            newItem.innerHTML = `
                            <div class="video-preview">
                                <video class="video-thumbnail" src="${URL.createObjectURL(file)}" muted loop></video>
                            </div>
                            <div class="video-info">
                                <div class="video-name">${file.name}</div>
                                <div class="video-size">${size} MB</div>
                            </div>
                            <div class="video-actions">
                                <button class="video-play-btn">播放</button>
                                <button class="video-delete-btn">删除</button>
                            </div>
                        `;
            uploadedVideos.appendChild(newItem);

            // 绑定视频操作按钮
            bindVideoActions(newItem);
          }

          function bindVideoActions(videoItem) {
            // 播放按钮
            videoItem.querySelector('.video-play-btn').addEventListener('click', function () {
              const video = videoItem.querySelector('.video-thumbnail');
              if (video) {
                const videoModal = createActionModal('视频播放', `
                                    <div class="video-player-container">
                                        <video class="video-player" controls>
                                            <source src="${video.src}" type="video/mp4">
                                        </video>
                                    </div>
                                `);
                document.body.appendChild(videoModal);
                openActionModal(videoModal);
              }
            });

            // 删除按钮
            videoItem.querySelector('.video-delete-btn').addEventListener('click', function () {
              // 自定义确认对话框
              const confirmModal = createActionModal('确认删除', `
                                <div class="confirm-dialog">
                                    <p>确定要删除这个视频吗？</p>
                                    <div class="form-actions">
                                        <button class="form-cancel" id="confirmCancel">取消</button>
                                        <button class="form-submit" id="confirmDelete">删除</button>
                                    </div>
                                </div>
                            `);
              document.body.appendChild(confirmModal);

              document.getElementById('confirmCancel').addEventListener('click', () => {
                closeActionModal(confirmModal);
              });

              document.getElementById('confirmDelete').addEventListener('click', () => {
                videoItem.remove();
                closeActionModal(confirmModal);
                showNotification('视频已删除', 'success');
              });

              openActionModal(confirmModal);
            });
          }

          // 绑定现有视频的操作按钮
          document.querySelectorAll('.video-item').forEach(item => {
            bindVideoActions(item);
          });

          openActionModal(videoModal);
          break;
      }
    }

    function createActionModal(title, content) {
      const overlay = document.createElement('div');
      overlay.className = 'action-modal-overlay';
      overlay.innerHTML = `
                <div class="action-modal-content">
                    <button class="action-modal-close">&times;</button>
                    <h2 class="action-modal-title">${title}</h2>
                    <div class="action-modal-body">${content}</div>
                </div>
            `;

      overlay.querySelector('.action-modal-close').addEventListener('click', () => {
        closeActionModal(overlay);
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          closeActionModal(overlay);
        }
      });

      return overlay;
    }

    function openActionModal(modal) {
      modal.style.display = 'flex';
      // 保存当前滚动位置
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;

      // 添加固定定位类，而不是改变overflow
      document.body.classList.add('modal-open');

      // 手动设置滚动位置，防止页面跳动
      window.scrollTo({
        top: scrollTop,
        left: scrollLeft,
        behavior: 'instant'
      });
    }

    function closeActionModal(modal) {
      modal.style.display = 'none';
      // 移除固定定位类
      document.body.classList.remove('modal-open');
      modal.remove();
    }

    function renderGallery(data) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = data.map(img => `
                <img src="${img.src}" alt="${img.alt}" class="gallery-img" data-src="${img.src}" data-alt="${img.alt}">
            `).join('');

      document.querySelectorAll('.gallery-img').forEach(img => {
        img.addEventListener('click', () => {
          const src = img.dataset.src;
          const alt = img.dataset.alt;
          const imageModalOverlay = document.getElementById('imageModalOverlay');
          const imageViewer = document.getElementById('imageViewer');

          imageModalOverlay.style.display = 'flex';

          const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
          const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;

          document.body.classList.add('modal-open');

          window.scrollTo({
            top: scrollTop,
            left: scrollLeft,
            behavior: 'instant'
          });

          imageViewer.innerHTML = `<img src="${src}" alt="${alt}" class="full-size-img">`;
        });
      });
    }

    function parseContent(text) {
      return text.replace(/\{highlight\}(.*?)\{\/highlight\}/g, '<mark class="highlight">$1</mark>');
    }

    function renderContent(data) {
      const contentSection = document.getElementById('contentSection');
      contentSection.innerHTML = `<div class="content-inner">${data.map(item => `
                <p class="content-paragraph">${parseContent(item.text)}</p>
            `).join('')}</div>`;
    }

    function initPage(data) {
      document.getElementById('articleTitle').textContent = data.title;
      document.getElementById('subtitle').textContent = data.subtitle;
      document.getElementById('expandLink').textContent = data.expandText;
      document.getElementById('expandLink').href = data.expandLink;

      // 增大赞助商信息字体大小 30%
      const sponsorLink = document.querySelector('.sponsor-link');
      if (sponsorLink) {
        sponsorLink.style.fontSize = '1.45rem';
      }

      renderNav(data.nav);
      renderActions(data.actions);
      renderGallery(data.images);
      renderContent(data.content);

      initModal(data.moreImages);
    }

    function initModal(images) {
      const modalOverlay = document.getElementById('modalOverlay');
      const waterfallGallery = document.getElementById('waterfallGallery');
      let fromMoreImages = false;

      function renderWaterfall(data) {
        const maxVisible = 9;
        const visibleImages = data.slice(0, maxVisible - 1); // 前8张
        const hasMore = data.length > maxVisible;

        let html = visibleImages.map(img => `
                    <div class="waterfall-item">
                        <img src="${img.src}" alt="${img.alt}" class="waterfall-img" data-src="${img.src}" data-alt="${img.alt}">
                    </div>
                `).join('');

        // 如果超过9张，在第9个位置显示展开按钮
        if (hasMore) {
          html += `
                        <div class="waterfall-item">
                            <div class="waterfall-expand" id="waterfallExpand">
                                <div class="waterfall-expand-icon">+</div>
                                <div class="waterfall-expand-text">查看全部</div>
                            </div>
                        </div>
                    `;
        }
        // 如果不足9张，渲染剩余的图片
        else if (data.length > visibleImages.length) {
          const remainingImages = data.slice(visibleImages.length);
          html += remainingImages.map(img => `
                        <div class="waterfall-item">
                            <img src="${img.src}" alt="${img.alt}" class="waterfall-img" data-src="${img.src}" data-alt="${img.alt}">
                        </div>
                    `).join('');
        }

        waterfallGallery.innerHTML = html;

        // 绑定图片点击事件
        document.querySelectorAll('.waterfall-img').forEach(img => {
          img.addEventListener('click', () => {
            const src = img.dataset.src;
            const alt = img.dataset.alt;
            fromMoreImages = true;
            openImageModal(src, alt);
          });
        });

        // 绑定展开按钮点击事件
        const expandBtn = document.getElementById('waterfallExpand');
        if (expandBtn) {
          expandBtn.addEventListener('click', () => {
            // 渲染所有图片
            let allHtml = data.map(img => `
                            <div class="waterfall-item">
                                <img src="${img.src}" alt="${img.alt}" class="waterfall-img" data-src="${img.src}" data-alt="${img.alt}">
                            </div>
                        `).join('');
            waterfallGallery.innerHTML = allHtml;

            // 重新绑定图片点击事件
            document.querySelectorAll('.waterfall-img').forEach(img => {
              img.addEventListener('click', () => {
                const src = img.dataset.src;
                const alt = img.dataset.alt;
                fromMoreImages = true;
                openImageModal(src, alt);
              });
            });
          });
        }
      }

      function openModal() {
        const imageModalOverlay = document.getElementById('imageModalOverlay');
        modalOverlay.style.display = 'flex';
        imageModalOverlay.style.display = 'none';

        // 保存当前滚动位置
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;

        // 添加固定定位类
        document.body.classList.add('modal-open');

        // 手动设置滚动位置
        window.scrollTo({
          top: scrollTop,
          left: scrollLeft,
          behavior: 'instant'
        });

        renderWaterfall(images);
      }

      function closeModal() {
        modalOverlay.style.display = 'none';
        // 移除固定定位类
        document.body.classList.remove('modal-open');
      }

      function openImageModal(src, alt) {
        const imageModalOverlay = document.getElementById('imageModalOverlay');
        const imageViewer = document.getElementById('imageViewer');
        modalOverlay.style.display = 'none';
        imageModalOverlay.style.display = 'flex';

        // 保存当前滚动位置
        const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const scrollLeft = window.pageXOffset || document.documentElement.scrollLeft;

        // 添加固定定位类
        document.body.classList.add('modal-open');

        // 手动设置滚动位置
        window.scrollTo({
          top: scrollTop,
          left: scrollLeft,
          behavior: 'instant'
        });

        imageViewer.innerHTML = `<img src="${src}" alt="${alt}" class="full-size-img">`;
      }

      function closeImageModal() {
        const imageModalOverlay = document.getElementById('imageModalOverlay');
        imageModalOverlay.style.display = 'none';
        if (fromMoreImages) {
          modalOverlay.style.display = 'flex';
        } else {
          // 移除固定定位类
          document.body.classList.remove('modal-open');
        }
        fromMoreImages = false;
      }

      expandLink.addEventListener('click', (e) => {
        e.preventDefault();
        openModal();
      });

      modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
          closeModal();
        }
      });

      const imageModalOverlay = document.getElementById('imageModalOverlay');
      imageModalOverlay.addEventListener('click', (e) => {
        if (e.target === imageModalOverlay) {
          closeImageModal();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (imageModalOverlay.style.display === 'flex') {
            closeImageModal();
          } else if (modalOverlay.style.display === 'flex') {
            closeModal();
          } else {
            // 关闭所有action模态框
            document.querySelectorAll('.action-modal-overlay').forEach(modal => {
              closeActionModal(modal);
            });
          }
        }

        // 快捷键支持
        if (e.ctrlKey) {
          switch (e.key) {
            case 'e':
              e.preventDefault();
              handleAction('编辑');
              break;
            case 'd':
              e.preventDefault();
              handleAction('讨论');
              break;
            case 'u':
              e.preventDefault();
              handleAction('上传视频');
              break;
          }
        }
      });
    }

    // 错误处理
    function handleError(error, message) {
      const errorModal = createActionModal('错误', `
                <div class="error-message">
                    <div class="error-icon">⚠️</div>
                    <div class="error-text">${message}</div>
                    <div class="error-detail">${error.message || '未知错误'}</div>
                    <button class="form-submit" id="errorClose">确定</button>
                </div>
            `);
      document.body.appendChild(errorModal);
      document.getElementById('errorClose').addEventListener('click', () => {
        closeActionModal(errorModal);
      });
      openActionModal(errorModal);
    }

    // 显示通知
    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `notification notification-${type}`;
      notification.innerHTML = `
                <div class="notification-content">${message}</div>
            `;
      document.body.appendChild(notification);

      // 显示动画
      setTimeout(() => {
        notification.classList.add('show');
      }, 10);

      // 3秒后自动消失
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => {
          notification.remove();
        }, 300);
      }, 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      try {
        initPage(pageData);
      } catch (error) {
        handleError(error, '页面初始化失败');
      }
    });
  </script>
</body>
